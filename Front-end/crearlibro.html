<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL"
        crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <title>Agregar libro</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<style>
      
  /* estilo boton */
  .button {
display: block;
position: relative;
width: 56px;
height: 56px;
margin: 0;
overflow: hidden;
outline: none;
background-color: transparent;
cursor: pointer;
border: 0;
}

.button:before,
.button:after {
content: "";
position: absolute;
border-radius: 50%;
inset: 7px;
}

.button:before {
border: 4px solid #198754;
transition: opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1) 80ms,
transform 0.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) 80ms;
}

.button:after {
border: 4px solid #ffffff;
transform: scale(1.3);
transition: opacity 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
opacity: 0;
}

.button:hover:before,
.button:focus:before {
opacity: 0;
transform: scale(0.7);
transition: opacity 0.4s cubic-bezier(0.165, 0.84, 0.44, 1),
transform 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94);
}

.button:hover:after,
.button:focus:after {
opacity: 1;
transform: scale(1);
transition: opacity 0.4s cubic-bezier(0.77, 0, 0.175, 1) 80ms,
transform 0.5s cubic-bezier(0.455, 0.03, 0.515, 0.955) 80ms;
}

.button-box {
display: flex;
position: absolute;
top: 0;
left: 0;
}

.button-elem {
display: block;
width: 20px;
height: 20px;
margin: 17px 18px 0 18px;
transform: rotate(180deg);
fill: #198754;
}

.button:hover .button-box,
.button:focus .button-box {
transition: 0.4s;
transform: translateX(-56px);
}

</style>
<body>
  <div class="container">
    <h1>Agregar Libro</h1>
    <div class="row">
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="titulo">Titulo</label>
            <input type="text" id="titulo" class="form-control Dark__input">
        </div>
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="autor">Autor</label>
            <input type="text" id="autor" class="form-control Dark__input">
        </div>
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="ISBN">ISBN</label>
            <input type="number" id="ISBN" class="form-control Dark__input">
        </div>
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="genero">Genero</label>
            <input type="text" id="genero" class="form-control Dark__input">
        </div>
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="numEjemdisponibles">Numero disponibles</label>
            <input type="number" id="numEjemdisponibles" class="form-control Dark__input">
        </div>
        <div class="col col-xl-6 col-12 Dark__container">
            <label class="Dark__label" for="numEjemocupados">Numero ocupados</label>
            <input type="number" id="numEjemocupados" class="form-control Dark__input">
        </div>
    </div>
    <button class="btn btn-success" onclick="agregarLibro()">Enviar</button>
    <button class="btn btn-secondary" onclick="limpiarFormulario()">Limpiar</button>
</div>
  
    <div id="mensaje" style="color: green;"></div>
<script src="../Front-end/jsBiblio/libro.js"></script>
</body>
</html>
